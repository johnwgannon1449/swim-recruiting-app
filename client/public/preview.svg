<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1E3A5F"/>
  <!-- Subtle grid lines for depth -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Amber accent bar at top -->
  <rect x="0" y="0" width="1200" height="6" fill="#F59E0B"/>
  <!-- Room4AI wordmark -->
  <text
    x="600"
    y="295"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-size="96"
    font-weight="700"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-2"
    fill="#ffffff"
  >Room<tspan fill="#F59E0B">4</tspan>AI</text>
  <!-- Tagline -->
  <text
    x="600"
    y="380"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-size="28"
    font-weight="400"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="1"
    fill="#F59E0B"
  >Lesson planning, elevated.</text>
</svg>
